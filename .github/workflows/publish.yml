name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to publish (e.g., armada-vscode-v0.2.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    # Add environment for additional protection before publishing
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run linter
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests
        run: xvfb-run -a npm run test
        # TODO: Remove continue-on-error once tests are implemented
        # Currently there are no tests, so this step would fail
        continue-on-error: true

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: npm run package

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -p "$VSCE_PAT"
