name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl xvfb

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Cache CLI tools
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/kubectl
            /usr/local/bin/kind
            /usr/local/bin/armadactl
          key: cli-tools-${{ runner.os }}-kubectl-latest-kind-0.20.0-armadactl-0.20.28
          restore-keys: |
            cli-tools-${{ runner.os }}-

      - name: Install kubectl
        run: |
          if [ ! -f /usr/local/bin/kubectl ]; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi
          kubectl version --client

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Install kind
        run: |
          if [ ! -f /usr/local/bin/kind ]; then
            curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
            chmod +x ./kind
            sudo mv ./kind /usr/local/bin/kind
          fi
          kind version

      - name: Cache Helm charts
        uses: actions/cache@v4
        with:
          path: ~/.cache/helm
          key: helm-charts-${{ hashFiles('dev/operator/quickstart/pulsar.values.yaml', 'dev/operator/quickstart/redis.values.yaml', 'dev/operator/quickstart/postgres.values.yaml') }}
          restore-keys: |
            helm-charts-

      - name: Cache kind images
        uses: actions/cache@v4
        with:
          path: /tmp/kind-image-cache
          key: kind-images-${{ runner.os }}-v2
          restore-keys: |
            kind-images-${{ runner.os }}-

      - name: Pre-pull common images (background)
        run: |
          # Pre-pull common images in parallel to speed up setup
          docker pull postgres:17-alpine &
          docker pull apachepulsar/pulsar:3.3.2 &
          docker pull redis:7.4-alpine &
          wait
        continue-on-error: true

      - name: Setup Armada with kind
        working-directory: dev
        run: |
          echo "Setting up minimal Armada cluster for CI..."
          make up-ci
        timeout-minutes: 30

      - name: Wait for Armada to be ready
        run: |
          set -euo pipefail
          echo "Waiting for Armada components to be ready..."

          kubectl --context kind-armada wait --for=condition=Available --timeout=330s -n armada-system deployment/armada-operator-controller-manager
          kubectl --context kind-armada wait --for=condition=Available --timeout=330s -n data deployment/pulsar deployment/redis deployment/postgres

          echo "Waiting for core Armada deployments to be created and available..."
          for deployment in armada-server armada-scheduler armada-event-ingester armada-executor; do
            kubectl --context kind-armada wait --for=create --timeout=420s -n armada deployment/$deployment
            kubectl --context kind-armada wait --for=condition=Available --timeout=420s -n armada deployment/$deployment
          done

          echo "Waiting for Armada migration jobs to complete (if any)..."
          ARMADA_JOBS=$(kubectl --context kind-armada get jobs -n armada -o name 2>/dev/null || true)
          if [ -n "$ARMADA_JOBS" ]; then
            while IFS= read -r job; do
              [ -z "$job" ] && continue
              kubectl --context kind-armada wait --for=condition=complete --timeout=330s -n armada "$job"
            done <<< "$ARMADA_JOBS"
          fi

          echo "Checking final status..."
          kubectl --context kind-armada get pods -n armada-system
          kubectl --context kind-armada get pods -n data
          kubectl --context kind-armada get deploy -n armada
          kubectl --context kind-armada get jobs -n armada || true
          kubectl --context kind-armada get pods -n armada
        timeout-minutes: 15

      - name: Verify Armada core endpoints
        run: |
          set -euo pipefail
          echo "Verifying core Armada deployment and service..."
          kubectl --context kind-armada wait --for=condition=Available --timeout=60s -n armada deployment/armada-server
          kubectl --context kind-armada get svc -n armada armada-server
          kubectl --context kind-armada get pods -n armada

      - name: Install armadactl
        run: |
          if [ ! -f /usr/local/bin/armadactl ]; then
            echo "Installing armadactl from GitHub releases..."
            ARMADACTL_VERSION="0.20.28"
            curl -L "https://github.com/armadaproject/armada/releases/download/v${ARMADACTL_VERSION}/armadactl_${ARMADACTL_VERSION}_linux_amd64.tar.gz" -o armadactl.tar.gz
            tar -xzf armadactl.tar.gz
            chmod +x armadactl
            sudo mv armadactl /usr/local/bin/
          fi
          armadactl version

      - name: Setup armadactl config test configuration
        run: |
          mkdir -p $HOME/.config
          cat > $HOME/.armadactl.yaml <<EOF
          currentContext: test
          contexts:
            test:
              armadaUrl: localhost:30002
              execTimeout: 2m
          EOF
          cat $HOME/.armadactl.yaml

      - name: Create test queue
        working-directory: dev
        run: |
          echo "Creating test queue for integration tests..."
          bash scripts/create-test-queue.sh

      - name: Compile TypeScript
        run: npm run compile

      - name: Run Integration Tests
        run: |
          echo "Running integration tests..."
          xvfb-run -a npm test
        env:
          DISPLAY: ":99.0"
          CI: "true"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Armada System Pods ==="
          kubectl --context kind-armada get pods -n armada-system
          echo "=== Armada Pods ==="
          kubectl --context kind-armada get pods -n armada
          echo "=== Data Pods ==="
          kubectl --context kind-armada get pods -n data || true
          echo "=== Armada Operator Logs ==="
          kubectl --context kind-armada logs -n armada-system deployment/armada-operator-controller-manager --tail=100 || true
          echo "=== Kind cluster info ==="
          kind get clusters
          kubectl --context kind-armada cluster-info

      - name: Cleanup
        if: always()
        working-directory: dev
        run: |
          echo "Cleaning up Armada cluster..."
          make down || true
