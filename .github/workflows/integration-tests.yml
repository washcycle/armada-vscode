name: Integration Tests

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 2am UTC
  workflow_dispatch:

concurrency:
  group: integration-test
  cancel-in-progress: true

permissions:
  contents: read

# All Docker images used in CI — pinned for cacheability and reproducibility
env:
  KIND_NODE_IMAGE: kindest/node:v1.29.2
  POSTGRES_IMAGE: postgres:17-alpine
  PULSAR_IMAGE: apachepulsar/pulsar:3.3.2
  REDIS_IMAGE: redis:7.4-alpine
  KUBE_RBAC_PROXY_IMAGE: registry.k8s.io/kubebuilder/kube-rbac-proxy:v0.16.0
  ARMADA_OPERATOR_IMAGE: gresearch/armada-operator:0.6.0
  ARMADA_SERVER_IMAGE: gresearch/armada-server:0.20.28
  ARMADA_SCHEDULER_IMAGE: gresearch/armada-scheduler:0.20.28
  ARMADA_EVENT_INGESTER_IMAGE: gresearch/armada-event-ingester:0.20.28
  ARMADA_EXECUTOR_IMAGE: gresearch/armada-executor:0.20.28
  ARMADA_LOOKOUT_IMAGE: gresearch/armada-lookout:0.20.28
  # Cache key version — bump to invalidate image cache
  IMAGE_CACHE_VERSION: v1

jobs:
  integration-test:
    # Skip integration tests for release commits
    if: "!startsWith(github.event.head_commit.message, 'chore(main): release')"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ── Parallel setup: Node + system deps + Docker image cache ──
      # These run in the background while kind cluster is created

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache CLI tools
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/kubectl
            /usr/local/bin/kind
            /usr/local/bin/armadactl
          key: cli-tools-${{ runner.os }}-kubectl-latest-kind-0.20.0-armadactl-0.20.28
          restore-keys: |
            cli-tools-${{ runner.os }}-

      - name: Install kubectl
        run: |
          if [ ! -f /usr/local/bin/kubectl ]; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi
          kubectl version --client

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Install kind
        run: |
          if [ ! -f /usr/local/bin/kind ]; then
            curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
            chmod +x ./kind
            sudo mv ./kind /usr/local/bin/kind
          fi
          kind version

      - name: Cache Helm charts
        uses: actions/cache@v4
        with:
          path: ~/.cache/helm
          key: helm-charts-${{ hashFiles('dev/operator/quickstart/pulsar.values.yaml', 'dev/operator/quickstart/redis.values.yaml', 'dev/operator/quickstart/postgres.values.yaml') }}
          restore-keys: |
            helm-charts-

      # ── Docker image cache ──
      # Save all images to a tar on first run, restore from cache on subsequent runs.
      # This avoids pulling ~14 images from Docker Hub / registries on every run.

      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image-cache
          key: docker-images-${{ runner.os }}-${{ env.IMAGE_CACHE_VERSION }}-${{ env.ARMADA_SERVER_IMAGE }}
          restore-keys: |
            docker-images-${{ runner.os }}-${{ env.IMAGE_CACHE_VERSION }}-

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          echo "Loading cached Docker images..."
          if [ -f /tmp/docker-image-cache/images.tar ]; then
            docker load < /tmp/docker-image-cache/images.tar
            echo "Loaded cached images successfully"
          fi

      - name: Pull Docker images (on cache miss)
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          echo "Pulling all Docker images in parallel..."
          docker pull $POSTGRES_IMAGE &
          docker pull $PULSAR_IMAGE &
          docker pull $REDIS_IMAGE &
          docker pull $KUBE_RBAC_PROXY_IMAGE &
          docker pull $ARMADA_OPERATOR_IMAGE &
          docker pull $ARMADA_SERVER_IMAGE &
          docker pull $ARMADA_SCHEDULER_IMAGE &
          docker pull $ARMADA_EVENT_INGESTER_IMAGE &
          docker pull $ARMADA_EXECUTOR_IMAGE &
          docker pull $ARMADA_LOOKOUT_IMAGE &
          wait
          echo "All images pulled"

      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-image-cache
          echo "Saving Docker images to cache..."
          docker save \
            $POSTGRES_IMAGE \
            $PULSAR_IMAGE \
            $REDIS_IMAGE \
            $KUBE_RBAC_PROXY_IMAGE \
            $ARMADA_OPERATOR_IMAGE \
            $ARMADA_SERVER_IMAGE \
            $ARMADA_SCHEDULER_IMAGE \
            $ARMADA_EVENT_INGESTER_IMAGE \
            $ARMADA_EXECUTOR_IMAGE \
            $ARMADA_LOOKOUT_IMAGE \
            -o /tmp/docker-image-cache/images.tar
          echo "Saved $(du -h /tmp/docker-image-cache/images.tar | cut -f1) of images"

      # ── Parallel: npm ci + apt-get + kind create ──
      # Overlap independent setup steps to save ~16s

      - name: Parallel setup (npm, apt, kind)
        run: |
          set -e

          # Start npm install in background
          npm ci &
          NPM_PID=$!

          # Start apt-get install in background
          (sudo apt-get update && sudo apt-get install -y curl xvfb) &
          APT_PID=$!

          # Create kind cluster in foreground (needs kubectl, kind already installed)
          echo "Creating kind cluster..."
          kind create cluster --name armada --config dev/operator/kind-config.yaml --image $KIND_NODE_IMAGE

          # Load images into kind while npm/apt finish
          echo "Loading images into kind cluster..."
          kind load docker-image --name armada \
            $POSTGRES_IMAGE \
            $PULSAR_IMAGE \
            $REDIS_IMAGE \
            $KUBE_RBAC_PROXY_IMAGE \
            $ARMADA_OPERATOR_IMAGE \
            $ARMADA_SERVER_IMAGE \
            $ARMADA_SCHEDULER_IMAGE \
            $ARMADA_EVENT_INGESTER_IMAGE \
            $ARMADA_EXECUTOR_IMAGE \
            $ARMADA_LOOKOUT_IMAGE

          # Wait for background jobs
          echo "Waiting for npm ci..."
          wait $NPM_PID
          echo "Waiting for apt-get..."
          wait $APT_PID
          echo "Parallel setup complete"

      # ── Armada setup (kind cluster already exists with images loaded) ──

      - name: Setup Armada components
        working-directory: dev
        run: |
          echo "Setting up Armada components..."
          make helm-repos-ci
          make install-cert-manager & p1=$!
          make install-prometheus-crds & p2=$!
          make install-armada-deps-ci & p3=$!
          wait $p1
          wait $p2
          wait $p3
          make install-armada-operator \
            ARMADA_OPERATOR_IMAGE_TAG=$(echo $ARMADA_OPERATOR_IMAGE | cut -d: -f2)
          make patch-operator-rbac
          make wait-for-operator-webhook
          make apply-priority-class
          make apply-armada-crs-ci \
            ARMADA_IMAGE_TAG=$(echo $ARMADA_SERVER_IMAGE | cut -d: -f2)
        timeout-minutes: 15

      - name: Apply Lookout for database migrations
        run: |
          echo "Applying Lookout CR to create queue table..."
          ARMADA_IMAGE_TAG=$(echo $ARMADA_LOOKOUT_IMAGE | cut -d: -f2)
          # Patch lookout CR with pinned tag
          sed "s/tag: latest/tag: $ARMADA_IMAGE_TAG/" dev/operator/quickstart/crs/lookout.yaml | \
            kubectl --context kind-armada apply -n armada -f -

          echo "Waiting for lookout migration job to complete..."
          kubectl --context kind-armada wait --for=condition=complete --timeout=120s -n armada job/armada-lookout-migration

          echo "Waiting for lookout deployment to be created..."
          for i in $(seq 1 60); do
            if kubectl --context kind-armada get deployment/armada-lookout -n armada >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "Waiting for lookout deployment to be available..."
          kubectl --context kind-armada wait --for=condition=Available --timeout=120s -n armada deployment/armada-lookout

      - name: Wait for Armada to be ready
        run: |
          set -euo pipefail
          echo "Waiting for Armada components to be ready..."

          kubectl --context kind-armada wait --for=condition=Available --timeout=330s -n armada-system deployment/armada-operator-controller-manager
          kubectl --context kind-armada wait --for=condition=Available --timeout=330s -n data deployment/pulsar deployment/redis deployment/postgres

          echo "Waiting for core Armada deployments to be created and available..."
          for deployment in armada-server armada-scheduler armada-event-ingester armada-executor; do
            for i in $(seq 1 84); do
              if kubectl --context kind-armada get deployment/$deployment -n armada >/dev/null 2>&1; then
                break
              fi
              sleep 5
            done

            if ! kubectl --context kind-armada get deployment/$deployment -n armada >/dev/null 2>&1; then
              echo "Timed out waiting for deployment/$deployment to be created in namespace armada"
              kubectl --context kind-armada get deploy -n armada || true
              kubectl --context kind-armada get pods -n armada || true
              kubectl --context kind-armada get events -n armada --sort-by=.metadata.creationTimestamp | tail -n 50 || true
              exit 1
            fi

            kubectl --context kind-armada wait --for=condition=Available --timeout=420s -n armada deployment/$deployment
          done

          echo "Waiting for Armada migration jobs to complete (if any)..."
          ARMADA_JOBS=$(kubectl --context kind-armada get jobs -n armada -o name 2>/dev/null || true)
          if [ -n "$ARMADA_JOBS" ]; then
            while IFS= read -r job; do
              [ -z "$job" ] && continue
              kubectl --context kind-armada wait --for=condition=complete --timeout=330s -n armada "$job"
            done <<< "$ARMADA_JOBS"
          fi

          echo "Checking final status..."
          kubectl --context kind-armada get pods -n armada-system
          kubectl --context kind-armada get pods -n data
          kubectl --context kind-armada get deploy -n armada
          kubectl --context kind-armada get jobs -n armada || true
          kubectl --context kind-armada get pods -n armada
        timeout-minutes: 15

      - name: Verify Armada core endpoints
        run: |
          set -euo pipefail
          echo "Verifying core Armada deployment and service..."
          kubectl --context kind-armada wait --for=condition=Available --timeout=60s -n armada deployment/armada-server
          kubectl --context kind-armada get svc -n armada armada-server
          kubectl --context kind-armada get pods -n armada

      - name: Install armadactl
        run: |
          if [ ! -f /usr/local/bin/armadactl ]; then
            echo "Installing armadactl from GitHub releases..."
            ARMADACTL_VERSION="0.20.28"
            curl -L "https://github.com/armadaproject/armada/releases/download/v${ARMADACTL_VERSION}/armadactl_${ARMADACTL_VERSION}_linux_amd64.tar.gz" -o armadactl.tar.gz
            tar -xzf armadactl.tar.gz
            chmod +x armadactl
            sudo mv armadactl /usr/local/bin/
          fi
          armadactl version

      - name: Setup armadactl config test configuration
        run: |
          mkdir -p $HOME/.config
          cat > $HOME/.armadactl.yaml <<EOF
          currentContext: test
          contexts:
            test:
              armadaUrl: localhost:30002
              execTimeout: 2m
          EOF
          cat $HOME/.armadactl.yaml

      - name: Create test queue
        working-directory: dev
        run: |
          echo "Creating test queue for integration tests..."
          bash scripts/create-test-queue.sh

      - name: Compile TypeScript
        run: npm run compile

      - name: Run Integration Tests
        run: |
          echo "Running integration tests..."
          xvfb-run -a npm test
        env:
          DISPLAY: ":99.0"
          CI: "true"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Armada System Pods ==="
          kubectl --context kind-armada get pods -n armada-system
          echo "=== Armada Pods ==="
          kubectl --context kind-armada get pods -n armada
          echo "=== Data Pods ==="
          kubectl --context kind-armada get pods -n data || true
          echo "=== Armada Operator Logs ==="
          kubectl --context kind-armada logs -n armada-system deployment/armada-operator-controller-manager --tail=100 || true
          echo "=== Kind cluster info ==="
          kind get clusters
          kubectl --context kind-armada cluster-info

      - name: Cleanup
        if: always()
        working-directory: dev
        run: |
          echo "Cleaning up Armada cluster..."
          make down || true
